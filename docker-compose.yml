services:
  redis:
    image: redis:7-alpine
    container_name: code-break-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - code-break-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: adityaisme/code-break-server:latest    # ← Changed from build to image
    container_name: code-break-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - code-break-network

  worker:
    image: adityaisme/code-break-worker:latest    # ← Changed from build to image
    container_name: code-break-worker
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: npm run worker
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - code-break-network

  client:
    image: adityaisme/code-break-client:latest    # ← Changed from build to image
    container_name: code-break-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - server
    networks:
      - code-break-network

networks:
  code-break-network:
    driver: bridge

volumes:
  redis_data: