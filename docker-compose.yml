services:
  mongodb:
    image: mongo:7
    container_name: code-break-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: code-break-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app-network

  app:
    build: .
    container_name: code-break-predictor
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/code-break-predictor
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your_super_secure_jwt_secret_change_this_in_production
      - JWT_EXPIRES_IN=7d
      - RATE_LIMIT_WINDOW_MS=3600000
      - RATE_LIMIT_MAX_REQUESTS=100
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=admin123
      - CORS_ORIGIN=http://localhost:3000,http://localhost:5173
      - FRONTEND_URL=http://localhost:3000
      - SMTP_HOST=smtp.sendgrid.net
      - SMTP_PORT=587
      - SMTP_USER=apikey
      - SMTP_PASS=api_key_from_sendgrid
      - EMAIL_FROM="Code Break Predictor <noreply@gmail.com>"
      - VITE_API_URL=http://localhost:3000/api
    depends_on:
      - mongodb
      - redis
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data: